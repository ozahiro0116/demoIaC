name: Bicep CD — Deploy to Azure

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/**'

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-web-sql-dev-eus2
  LOCATION: eastus2
  TEMPLATE_FILE: infra/main-web-sql.bicep
  PARAMETERS_FILE: infra/parameters/web-sql-dev.bicepparam

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags environment=dev project=web-sql-app

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file ${{ env.TEMPLATE_FILE }} \
            --parameters ${{ env.PARAMETERS_FILE }} \
            --name "deploy-$(date +%Y%m%d%H%M)"

      - name: Show Deployment Summary
        run: |
          DEPLOY_NAME=$(az deployment group list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[0].name" -o tsv)

          echo "### 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          az deployment group show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name "$DEPLOY_NAME" \
            --query "{Status:properties.provisioningState, Timestamp:properties.timestamp}" \
            -o table

          echo "| Output | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY

          OUTPUTS=$(az deployment group show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name "$DEPLOY_NAME" \
            --query "properties.outputs" -o json)

          WEBAPP=$(echo "$OUTPUTS" | jq -r '.webAppDefaultHostname.value // empty')
          SQL=$(echo "$OUTPUTS" | jq -r '.sqlServerFqdn.value // empty')
          RG=$(echo "$OUTPUTS" | jq -r '.resourceGroupName.value // empty')

          [ -n "$WEBAPP" ] && echo "| Web App URL | https://$WEBAPP |" >> $GITHUB_STEP_SUMMARY
          [ -n "$SQL" ] && echo "| SQL Server FQDN | $SQL |" >> $GITHUB_STEP_SUMMARY
          [ -n "$RG" ] && echo "| Resource Group | $RG |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment **$DEPLOY_NAME** completed successfully." >> $GITHUB_STEP_SUMMARY
